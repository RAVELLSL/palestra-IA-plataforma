
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diretório de Ferramentas IA · MINIMAL</title>
    <style>
        /* ===== ESTILO MINIMALISTA - GRID 3 COLUNAS ===== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Tema claro (padrão) - tonalidades claras */
        :root {
            --bg-color: #fafafa;
            --surface: #ffffff;
            --surface-hover: #f0f0f0;
            --border-light: #eaeaea;
            --border-accent: #dddddd;
            --text-primary: #1e1e1e;
            --text-secondary: #666666;
            --accent: #007aff;
            --accent-soft: rgba(0, 122, 255, 0.08);
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.02);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.06);
            --icon-favorite: #f5b342;
            --icon-favorite-inactive: #cccccc;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            min-height: 100vh;
            padding: 32px 20px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .main-title {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 650px;
            margin: 0 auto;
        }

        /* Barra de ferramentas */
        .toolbar {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-sm);
        }

        .search-wrapper {
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border-accent);
            border-radius: 40px;
            font-size: 1rem;
            font-family: var(--font-body);
            background: var(--bg-color);
            color: var(--text-primary);
            transition: border 0.2s, box-shadow 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 2;
            min-width: 240px;
        }

        .tab {
            padding: 8px 18px;
            border: 1px solid var(--border-accent);
            background: transparent;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .sort-controls {
            display: flex;
            gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border-accent);
            border-radius: 30px;
            padding: 4px;
        }

        .sort-btn, .theme-btn, .top5-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .sort-btn:hover, .theme-btn:hover, .top5-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .sort-btn.active, .top5-btn.active {
            background: var(--accent);
            color: #ffffff;
        }

        .theme-btn {
            border: 1px solid var(--border-accent);
        }

        /* Result info */
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 1rem;
            color: var(--text-secondary);
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 40px;
            border: 1px solid var(--border-light);
        }

        .result-count {
            font-weight: 700;
            color: var(--accent);
        }

        .clear-filters {
            background: none;
            border: 1px solid var(--border-accent);
            border-radius: 30px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            padding: 6px 16px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .clear-filters:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Lista de ferramentas - GRID 3 COLUNAS */
        .tools-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 28px 20px 24px;
            transition: box-shadow 0.2s, border-color 0.2s;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            height: fit-content;
        }

        .tool-item:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-hover);
        }

        .favorite-icon {
            font-size: 2rem;
            cursor: pointer;
            color: var(--icon-favorite-inactive);
            transition: color 0.2s;
            margin-bottom: 12px;
            align-self: center;
        }

        .favorite-icon.active {
            color: var(--icon-favorite);
        }

        .favorite-icon:hover {
            transform: scale(1.1);
        }

        .tool-logo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: #ffffff;
            padding: 8px;
            object-fit: contain;
            border: 1px solid var(--border-light);
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .tool-info {
            width: 100%;
            margin-bottom: 20px;
        }

        .tool-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .tool-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .tool-category {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            background: var(--accent-soft);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-accent);
            display: inline-block;
        }

        .tool-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-clamp: 2;
            overflow: hidden;
            line-height: 1.5;
            max-width: 90%;
            margin: 0 auto;
        }

        .tool-action {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .tool-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 40px;
            padding: 10px 24px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
            width: fit-content;
            min-width: 130px;
        }

        .tool-link i::before {
            content: "↗";
            font-style: normal;
            font-size: 1.1rem;
        }

        .tool-item:hover .tool-link {
            background: var(--accent);
            color: #ffffff;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border: 1px dashed var(--border-accent);
            border-radius: 24px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Responsividade */
        @media (max-width: 1024px) {
            .tools-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 700px) {
            .tools-list {
                grid-template-columns: 1fr;
            }
            .tool-item {
                padding: 24px 16px;
            }
            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 4px;
            }
            .tab {
                flex-shrink: 0;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
        }

        @media (max-width: 480px) {
            .tool-logo {
                width: 70px;
                height: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="main-title">Inteligência Artificial</h1>
            <p class="subtitle">Ferramentas selecionadas para turbinar sua criatividade, produtividade e conhecimento.</p>
        </header>

        <div class="toolbar">
            <div class="search-wrapper">
                <input type="text" class="search-box" id="searchInput" placeholder="Buscar ferramentas por nome ou descrição...">
            </div>
            
            <div class="controls-row">
                <div class="tabs" id="categoryTabs">
                    <button class="tab active" data-category="all">Todas</button>
                    <button class="tab" data-category="chat">Chat</button>
                    <button class="tab" data-category="creative">Criativas</button>
                    <button class="tab" data-category="video">Vídeo</button>
                    <button class="tab" data-category="productivity">Produtividade</button>
                </div>

                <div class="action-buttons">
                    <div class="sort-controls">
                        <button class="sort-btn active" data-sort="alpha">A-Z</button>
                        <button class="sort-btn" data-sort="favorite">⭐ Favoritos</button>
                    </div>
                    <button class="top5-btn" id="top5Btn">🔥 Top 5</button>
                    <button class="theme-btn" id="themeToggle">🌓 Tema</button>
                </div>
            </div>
        </div>

        <div class="results-info">
            <span><span class="result-count" id="resultCount">0</span> ferramentas encontradas</span>
            <button class="clear-filters" id="clearFilters">Limpar filtros</button>
        </div>

        <div class="tools-list" id="toolsList"></div>

        <footer class="footer">
            <p>© 2025 · Diretório de IA · Atualizado regularmente</p>
        </footer>
    </div>

    <script>
        (function() {
            // ---------- BASE DE DADOS DAS FERRAMENTAS ----------
            const tools = [
                { name: "ChatGPT", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMdM9MEQ0ExL1PmInT3U5I8v63YXBEdoIT0Q&s", category: "chat", description: "Assistente geral para conversas, criação de texto e suporte.", url: "https://chatgpt.com/" },
                { name: "Gemini", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcThr7qrIazsvZwJuw-uZCtLzIjaAyVW_ZrlEQ&s", category: "chat", description: "IA do Google integrada ao ecossistema Workspace e pesquisas.", url: "https://gemini.google.com/app" },
                { name: "Copilot", logo: "https://play-lh.googleusercontent.com/p8R1lAZI5_WCOzmvBYnOQasCWcjc9d2vM7z4PaVku8b9AfxGhqQqM0ldJ8KULHblVj-g", category: "chat", description: "Assistente da Microsoft para código, texto e busca.", url: "https://copilot.microsoft.com/" },
                { name: "Deepseek", logo: "https://cdn.worldvectorlogo.com/logos/deepseek-2.svg", category: "chat", description: "Focado em programação e raciocínio lógico profundo.", url: "https://chat.deepseek.com/" },
                { name: "Qwen", logo: "https://crystalpng.com/wp-content/uploads/2025/02/Qwen-05.png", category: "chat", description: "Modelo da Alibaba para tarefas diversas e suporte multilíngue.", url: "https://qwen.ai/home" },
                { name: "Grok", logo: "https://img.icons8.com/color/1200/grok--v2.jpg", category: "chat", description: "Assistente de IA da xAI com respostas diretas e atualizadas.", url: "https://grok.com/" },
                { name: "Suno", logo: "https://images.seeklogo.com/logo-png/52/2/suno-ai-logo-png_seeklogo-528379.png", category: "creative", description: "Criação de músicas e áudio com IA generativa.", url: "https://suno.com/" },
                { name: "Jules", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvAXEz4EsU3RQHCV96BAfJusei09ZBjQOG2g&s", category: "creative", description: "Geração e edição de imagens por comandos de texto.", url: "https://jules.google.com/task" },
                { name: "Manus AI", logo: "https://play-lh.googleusercontent.com/7RIeDBEnjVVn3d1yr441p7u0BK9eT8E6P9i__XYTcJAzOe7sqVgJp7pmlypqY9NBqjI", category: "creative", description: "Design gráfico e edição profissional com IA.", url: "https://manus.im/app" },
                { name: "LM Arena", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxPgTgdL2Ttbt9TCA8vYFPsFOqz_Dppec8gg&s", category: "creative", description: "Comparação lado a lado de grandes modelos de linguagem.", url: "https://lmarena.ai/?mode=direct" },
                { name: "Wan", logo: "https://catai.com.br/wp-content/uploads/2025/08/Wan-01.jpg", category: "video", description: "Criação automática de vídeos a partir de roteiros.", url: "https://create.wan.video/" },
                { name: "Vids", logo: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Google_Vids_2024_Logo.svg/250px-Google_Vids_2024_Logo.svg.png", category: "video", description: "Ferramenta do Google Workspace para edição e criação de vídeos.", url: "https://workspace.google.com/intl/pt-BR/products/vids/" },
                { name: "Perplexity", logo: "https://images.seeklogo.com/logo-png/61/2/perplexity-ai-icon-black-logo-png_seeklogo-611679.png", category: "productivity", description: "Mecanismo de busca com respostas geradas por IA.", url: "https://www.perplexity.ai/" },
                { name: "NotebookLM", logo: "https://static1.xdaimages.com/wordpress/wp-content/uploads/2025/03/notebooklm-removebg-preview.png", category: "productivity", description: "Organização de notas e resumos com base nos seus documentos.", url: "https://notebooklm.google.com/" }
            ];

            const categoryNames = {
                all: "Todas",
                chat: "Chat",
                creative: "Criativas",
                video: "Vídeo",
                productivity: "Produtividade"
            };

            // Elementos DOM
            const toolsListEl = document.getElementById('toolsList');
            const searchInput = document.getElementById('searchInput');
            const tabs = document.querySelectorAll('.tab');
            const resultCountSpan = document.getElementById('resultCount');
            const clearBtn = document.getElementById('clearFilters');
            const sortBtns = document.querySelectorAll('.sort-btn');
            const themeToggle = document.getElementById('themeToggle');
            const top5Btn = document.getElementById('top5Btn');

            // Estado
            let activeCategory = 'all';
            let searchTerm = '';
            let sortMode = 'alpha'; // 'alpha' ou 'favorite'
            let top5Mode = false;    // se true, mostra apenas as 5 mais usadas
            let favorites = JSON.parse(localStorage.getItem('iaFavorites')) || {};
            let usageCount = JSON.parse(localStorage.getItem('iaUsageCount')) || {};

            // Tema (apenas claro - removi o seletor de tema escuro para manter tonalidades claras)
            // Mas mantive o botão de tema caso queira, mas removi a classe dark-theme para não escurecer
            // Se quiser remover o botão, pode apagar. Vou manter apenas o ícone, mas sem funcionalidade escura.
            // Para simplificar, vou desabilitar a troca de tema escuro e manter sempre claro.
            // Mas vou deixar o botão lá, e ao clicar, ele não faz nada (ou apenas simula um toggle, mas sem mudar cores).
            // Melhor: removo a funcionalidade de tema escuro e deixo apenas o botão como decorativo? Não, vou manter o botão, mas sem efeito de escuro.
            // Na verdade, o usuário pediu tonalidades claras, então vamos fixar o tema claro e remover o themeToggle.
            // Vou comentar a parte do themeToggle e remover o botão da interface.
            // Mas para não quebrar, vou apenas esconder o botão com CSS.

            // ---------- FUNÇÕES ----------
            function saveFavorites() {
                localStorage.setItem('iaFavorites', JSON.stringify(favorites));
            }

            function saveUsageCount() {
                localStorage.setItem('iaUsageCount', JSON.stringify(usageCount));
            }

            function incrementUsage(toolName) {
                usageCount[toolName] = (usageCount[toolName] || 0) + 1;
                saveUsageCount();
            }

            function toggleFavorite(toolName) {
                if (favorites[toolName]) {
                    delete favorites[toolName];
                } else {
                    favorites[toolName] = true;
                }
                saveFavorites();
                renderList();
            }

            function filterTools() {
                return tools.filter(tool => {
                    if (activeCategory !== 'all' && tool.category !== activeCategory) return false;
                    if (searchTerm.trim() !== '') {
                        const term = searchTerm.toLowerCase();
                        return tool.name.toLowerCase().includes(term) || tool.description.toLowerCase().includes(term);
                    }
                    return true;
                });
            }

            function sortTools(toolsArray) {
                let sorted = [...toolsArray];
                if (top5Mode) {
                    sorted.sort((a, b) => (usageCount[b.name] || 0) - (usageCount[a.name] || 0));
                    return sorted.slice(0, 5);
                } else {
                    if (sortMode === 'alpha') {
                        sorted.sort((a, b) => a.name.localeCompare(b.name));
                    } else if (sortMode === 'favorite') {
                        sorted.sort((a, b) => {
                            const aFav = favorites[a.name] ? 1 : 0;
                            const bFav = favorites[b.name] ? 1 : 0;
                            if (aFav !== bFav) return bFav - aFav;
                            return a.name.localeCompare(b.name);
                        });
                    }
                    return sorted;
                }
            }

            function handleCardClick(toolName, url) {
                incrementUsage(toolName);
                window.open(url, '_blank');
            }

            function renderList() {
                const filtered = filterTools();
                const sorted = sortTools(filtered);
                resultCountSpan.textContent = sorted.length;

                if (sorted.length === 0) {
                    toolsListEl.innerHTML = `<div class="no-results">Nenhuma ferramenta encontrada com os filtros atuais.</div>`;
                    return;
                }

                let html = '';
                sorted.forEach(tool => {
                    const isFav = favorites[tool.name] || false;
                    html += `
                        <div class="tool-item" data-tool="${tool.name}" data-url="${tool.url}">
                            <span class="favorite-icon ${isFav ? 'active' : ''}" data-tool="${tool.name}">${isFav ? '⭐' : '☆'}</span>
                            <img src="${tool.logo}" alt="${tool.name}" class="tool-logo" loading="lazy" onerror="this.src='https://via.placeholder.com/80?text=IA'">
                            <div class="tool-info">
                                <div class="tool-header">
                                    <span class="tool-name">${tool.name}</span>
                                    <span class="tool-category">${categoryNames[tool.category] || tool.category}</span>
                                </div>
                                <div class="tool-description">${tool.description}</div>
                            </div>
                            <div class="tool-action">
                                <span class="tool-link">
                                    <span>Acessar</span>
                                    <i aria-hidden="true"></i>
                                </span>
                            </div>
                        </div>
                    `;
                });

                toolsListEl.innerHTML = html;

                // Eventos de clique nos cards (exceto na estrela)
                document.querySelectorAll('.tool-item').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.classList.contains('favorite-icon') || e.target.parentElement?.classList.contains('favorite-icon')) {
                            return;
                        }
                        const toolName = card.dataset.tool;
                        const url = card.dataset.url;
                        handleCardClick(toolName, url);
                    });
                });

                // Eventos nas estrelas
                document.querySelectorAll('.favorite-icon').forEach(star => {
                    star.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const toolName = star.dataset.tool;
                        toggleFavorite(toolName);
                    });
                });
            }

            function setActiveTab(category) {
                tabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.category === category);
                });
            }

            function setActiveSort(mode) {
                sortBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.sort === mode);
                });
            }

            function setTop5Mode(active) {
                top5Mode = active;
                top5Btn.classList.toggle('active', active);
                sortBtns.forEach(btn => {
                    btn.style.opacity = active ? '0.5' : '1';
                    btn.style.pointerEvents = active ? 'none' : 'auto';
                });
                renderList();
            }

            // ---------- EVENTOS ----------
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    activeCategory = e.currentTarget.dataset.category;
                    setActiveTab(activeCategory);
                    renderList();
                });
            });

            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderList();
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                searchTerm = '';
                activeCategory = 'all';
                setActiveTab('all');
                if (top5Mode) setTop5Mode(false);
                renderList();
            });

            sortBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (top5Mode) setTop5Mode(false);
                    sortMode = btn.dataset.sort;
                    setActiveSort(sortMode);
                    renderList();
                });
            });

            top5Btn.addEventListener('click', () => {
                setTop5Mode(!top5Mode);
            });

            // Removendo funcionalidade do tema para manter sempre claro
            // O botão themeToggle será escondido via CSS (display: none)
            themeToggle.style.display = 'none';

            // Inicialização
            function init() {
                setActiveTab('all');
                setActiveSort('alpha');
                setTop5Mode(false);
                // Atualizar contagem nas abas
                const allTab = document.querySelector('.tab[data-category="all"]');
                if (allTab) allTab.textContent = `Todas (${tools.length})`;
                tabs.forEach(tab => {
                    const cat = tab.dataset.category;
                    if (cat !== 'all') {
                        const count = tools.filter(t => t.category === cat).length;
                        tab.textContent = `${categoryNames[cat] || cat} (${count})`;
                    }
                });
                renderList();
            }

            init();
        })();
    </script>
</body>
</html>
